; ===========================================
; PlatformIO Project Configuration File
; ESP32 Smart Home - WiFi + Sinric Pro + MQTT
; ===========================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Velocidad del monitor serie (coincide con Serial.begin(115200) en el código)
monitor_speed = 115200

; Velocidad de subida (puedes bajarla a 115200 si tienes problemas de flasheo)
upload_speed = 921600

; Librerías necesarias
lib_deps =
    sinricpro/SinricPro @ 3.5.2
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    ; DNSServer, WiFi, WebServer y Preferences ya vienen incluidas
    ; con el core de Arduino para ESP32, no requieren instalación aparte.
    ;
    ; IMPORTANTE: SinricPro 3.5.x requiere ArduinoJson 7.x internamente
    ; (JsonDocument pasó a ser una clase pública en ArduinoJson v7).
    ; Si bajas la versión de SinricPro, es probable que necesites
    ; bajar también ArduinoJson a la v6 correspondiente, y viceversa.
    ; DynamicJsonDocument sigue funcionando en ArduinoJson v7 (deprecado
    ; pero funcional), así que el código main.cpp no necesita cambios.

; Flags de compilación (opcional, ayuda a evitar warnings/errores de memoria con SinricPro)
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINOJSON_ENABLE_STD_STRING=1

; Tamaño de partición (deja más espacio para el sketch si lo necesitas)
board_build.partitions = default.csv

; Monitor: filtra el ruido y muestra timestamps (opcional pero útil para debug)
monitor_filters = esp32_exception_decoder, time